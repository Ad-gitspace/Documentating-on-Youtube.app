name: docs_me
description: "A professional YouTube automation workflow for creators."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  http: ^1.2.0
  image_picker: ^1.1.0
  google_fonts: ^6.2.1
  youtube_player_flutter: ^9.1.3
  provider: ^6.1.5+1
  firebase_core: ^3.15.2
  firebase_analytics: ^11.4.1
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "lib/assets/logo2.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo2.png
    - lib/assets/app logo.png
